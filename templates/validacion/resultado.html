{% extends "base.html" %}
{% block title %}Resultado{% endblock %}

{% block content %}
<h2>Resultado de Validación</h2>

{% if resultado == "aprobado" %}
    <p style="font-size:22px; font-weight:bold; color:green;">
        ✅ APROBADO
    </p>
{% else %}
    <p style="font-size:22px; font-weight:bold; color:red;">
        ❌ DENEGADO
    </p>
{% endif %}

<a class="btn btn-primary" href="/validacion/">Volver</a>
{% endblock %}
